<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика расходов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .car-name {
            color: #666;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        canvas {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
        .total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c7da0;
            margin-top: 10px;
        }
        .note {
            font-size: 0.8rem;
            color: #999;
            margin-top: 20px;
        }
        .back-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .back-button:hover {
            background: #45a049;
        }
        @media (max-width: 500px) {
            .container { padding: 15px; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Статистика расходов</h2>
        <div class="car-name" id="carName">Загрузка...</div>
        <canvas id="expenseChart" width="400" height="400"></canvas>
        <div class="total" id="totalAmount"></div>
        <button class="back-button" onclick="closeWebApp()">🔙 Закрыть</button>
        <div class="note">Данные за всё время по выбранному автомобилю</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let chart = null;

        function closeWebApp() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.close();
            } else {
                window.close();
            }
        }

        function initChart(labels, data, total, carName) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: [
                            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF',
                            '#FF9F40', '#C9CBCF', '#7B68EE', '#20B2AA', '#FF69B4'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { font: { size: 12 } }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw;
                                    const total = context.dataset.data.reduce((a,b) => a+b, 0);
                                    const percent = ((value / total) * 100).toFixed(1);
                                    return `${context.label}: ${value.toFixed(2)} руб. (${percent}%)`;
                                }
                            }
                        }
                    }
                }
            });
            
            document.getElementById('carName').innerText = carName;
            document.getElementById('totalAmount').innerHTML = `💰 Общая сумма: ${total.toFixed(2)} руб.`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand(); // растягиваем на весь экран
            }

            // Получаем данные из URL параметра data
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            
            if (!dataParam) {
                document.getElementById('carName').innerText = 'Ошибка: нет данных';
                return;
            }
            
            try {
                const decoded = decodeURIComponent(dataParam);
                const stats = JSON.parse(decoded);
                if (stats && stats.labels && stats.values && stats.total && stats.car_name) {
                    initChart(stats.labels, stats.values, stats.total, stats.car_name);
                } else {
                    throw new Error('Неверный формат данных');
                }
            } catch (e) {
                console.error(e);
                document.getElementById('carName').innerText = 'Ошибка загрузки данных';
                document.getElementById('totalAmount').innerHTML = 'Попробуйте снова позже';
            }
        });
    </script>
</body>
</html>
